name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: signal
          POSTGRES_PASSWORD: signal
          POSTGRES_DB: signal_watcher
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U signal -d signal_watcher"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://signal:signal@localhost:5432/signal_watcher?schema=public
      REDIS_URL: redis://localhost:6379
      AI_PROVIDER: mock
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @signal-watcher/api prisma generate

      - name: Apply migrations
        run: pnpm --filter @signal-watcher/api prisma migrate deploy

      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
